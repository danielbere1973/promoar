name: Refresh VTEX Sessions

on:
  schedule:
    - cron: '0 6 */2 * *'   # día por medio a las 6am UTC
  workflow_dispatch:          # trigger manual desde GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Install Xvfb (virtual display for non-headless Playwright)
        run: sudo apt-get install -y xvfb

      - name: Refresh vtex promo cache
        env:
          API_URL: ${{ secrets.API_URL }}
          VTEX_SESSION_SECRET: ${{ secrets.VTEX_SESSION_SECRET }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          node scripts/refresh-vtex-sessions.js
