name: Run Scheduled Scrapers

on:
  schedule:
    # Mismo esquema que refresh-vtex-sessions.yml: los scrapers bancarios no
    # cambian de un día para el otro, así que no hace falta chequear
    # scrapers-due cada hora (24 corridas/día == 744/mes solo para preguntar
    # "¿hay algo pendiente?"). Se corre:
    #   1) 1 vez por semana (jueves de madrugada) — cadencia base.
    #   2) + el día hábil siguiente a cada feriado largo de 2026 (mismas 8
    #      fechas que refresh-vtex-sessions.yml — actualizar a fin de año
    #      para 2027).
    #   3) + primer día del mes (levanta lo que venció el último día del mes
    #      anterior — muchas promos vencen fin de mes).
    # Todo a las 5am UTC (2am ART) para no interferir con sistemas
    # corporativos de los bancos en horario hábil.
    - cron: '0 5 * * 4'    # jueves (semanal)
    - cron: '0 5 18 2 *'   # post carnaval
    - cron: '0 5 6 4 *'    # post semana santa
    - cron: '0 5 4 5 *'    # post día del trabajador
    - cron: '0 5 26 5 *'   # post 25 de mayo
    - cron: '0 5 16 6 *'   # post Güemes
    - cron: '0 5 18 8 *'   # post San Martín
    - cron: '0 5 13 10 *'  # post diversidad cultural
    - cron: '0 5 24 11 *'  # post soberanía nacional
    - cron: '0 5 1 * *'    # primer día del mes
  workflow_dispatch:
    inputs:
      scraper_id:
        description: 'ID del scraper a ejecutar (vacío = todos los programados)'
        required: false

env:
  PLAYWRIGHT_SCRAPERS: "amex,cabal,changomas,banco galicia,icbc,banco macro,naranjax,banco santander,banco supervielle,banco ciudad,visa,petersen,banco del sol"

jobs:
  check:
    runs-on: ubuntu-latest
    name: Determinar scrapers pendientes
    outputs:
      http_scrapers: ${{ steps.compute.outputs.http_scrapers }}
      playwright_scrapers: ${{ steps.compute.outputs.playwright_scrapers }}
    steps:
      - name: Determinar scrapers HTTP y Playwright a ejecutar
        id: compute
        run: |
          if [ -n "${{ github.event.inputs.scraper_id }}" ]; then
            INPUT="${{ github.event.inputs.scraper_id }}"
            HTTP=""
            PW=""
            IFS=',' read -ra LIST <<< "$INPUT"
            for S in "${LIST[@]}"; do
              S=$(echo "$S" | xargs)
              if echo "$PLAYWRIGHT_SCRAPERS" | grep -qi "$S"; then
                PW="${PW}${PW:+,}${S}"
              else
                HTTP="${HTTP}${HTTP:+,}${S}"
                PW="${PW}${PW:+,}${S}"
              fi
            done
            echo "http_scrapers=$HTTP" >> $GITHUB_OUTPUT
            echo "playwright_scrapers=$PW" >> $GITHUB_OUTPUT
          else
            RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.VTEX_SESSION_SECRET }}" "${{ secrets.API_URL }}/api/internal/scrapers-due")
            ALL=$(echo $RESPONSE | python3 -c "import sys,json; print(','.join(json.load(sys.stdin)['scrapers']))" 2>/dev/null || echo "")
            HTTP=""
            PW=""
            IFS=',' read -ra LIST <<< "$ALL"
            for S in "${LIST[@]}"; do
              if echo "$PLAYWRIGHT_SCRAPERS" | grep -qi "$S"; then
                PW="${PW}${PW:+,}${S}"
              else
                HTTP="${HTTP}${HTTP:+,}${S}"
              fi
            done
            echo "http_scrapers=$HTTP" >> $GITHUB_OUTPUT
            echo "playwright_scrapers=$PW" >> $GITHUB_OUTPUT
          fi

  run-http:
    needs: check
    if: needs.check.outputs.http_scrapers != ''
    runs-on: ubuntu-latest
    name: Scrapers HTTP
    steps:
      - name: Ejecutar scrapers HTTP
        run: |
          IFS=',' read -ra SCRAPER_LIST <<< "${{ needs.check.outputs.http_scrapers }}"
          for SCRAPER in "${SCRAPER_LIST[@]}"; do
            echo "Ejecutando HTTP: $SCRAPER"
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.VTEX_SESSION_SECRET }}" \
              -H "Content-Type: application/json" \
              -d "{\"scraperId\":\"$SCRAPER\"}" \
              "${{ secrets.API_URL }}/api/internal/run-scraper"
            echo ""
          done

  run-playwright:
    needs: check
    if: needs.check.outputs.playwright_scrapers != ''
    runs-on: ubuntu-latest
    name: Scrapers Playwright
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: playwright-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Ejecutar scrapers Playwright
        shell: bash
        env:
          API_URL: ${{ secrets.API_URL }}
          VTEX_SESSION_SECRET: ${{ secrets.VTEX_SESSION_SECRET }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          IFS=',' read -ra SCRAPER_LIST <<< "${{ needs.check.outputs.playwright_scrapers }}"
          for SCRAPER in "${SCRAPER_LIST[@]}"; do
            echo "Ejecutando Playwright: $SCRAPER"
            npx tsx scripts/run-playwright-scraper.ts "$SCRAPER"
          done
