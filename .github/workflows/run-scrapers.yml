name: Run Scheduled Scrapers

on:
  # schedule:
  #   - cron: '0 * * * *'   # cada hora — DESACTIVADO temporalmente (consumo de minutos GH Actions, ver CLAUDE.md). Reactivar en julio.
  workflow_dispatch:
    inputs:
      scraper_id:
        description: 'ID del scraper a ejecutar (vacío = todos los programados)'
        required: false

env:
  PLAYWRIGHT_SCRAPERS: "amex,cabal,changomas,banco galicia,icbc,banco macro,naranjax,banco santander,banco supervielle,banco ciudad,visa"

jobs:
  check:
    runs-on: ubuntu-latest
    name: Determinar scrapers pendientes
    outputs:
      http_scrapers: ${{ steps.compute.outputs.http_scrapers }}
      playwright_scrapers: ${{ steps.compute.outputs.playwright_scrapers }}
    steps:
      - name: Determinar scrapers HTTP y Playwright a ejecutar
        id: compute
        run: |
          if [ -n "${{ github.event.inputs.scraper_id }}" ]; then
            INPUT="${{ github.event.inputs.scraper_id }}"
            HTTP=""
            PW=""
            IFS=',' read -ra LIST <<< "$INPUT"
            for S in "${LIST[@]}"; do
              S=$(echo "$S" | xargs)
              if echo "$PLAYWRIGHT_SCRAPERS" | grep -qi "$S"; then
                PW="${PW}${PW:+,}${S}"
              else
                HTTP="${HTTP}${HTTP:+,}${S}"
                PW="${PW}${PW:+,}${S}"
              fi
            done
            echo "http_scrapers=$HTTP" >> $GITHUB_OUTPUT
            echo "playwright_scrapers=$PW" >> $GITHUB_OUTPUT
          else
            RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.VTEX_SESSION_SECRET }}" "${{ secrets.API_URL }}/api/internal/scrapers-due")
            ALL=$(echo $RESPONSE | python3 -c "import sys,json; print(','.join(json.load(sys.stdin)['scrapers']))" 2>/dev/null || echo "")
            HTTP=""
            PW=""
            IFS=',' read -ra LIST <<< "$ALL"
            for S in "${LIST[@]}"; do
              if echo "$PLAYWRIGHT_SCRAPERS" | grep -qi "$S"; then
                PW="${PW}${PW:+,}${S}"
              else
                HTTP="${HTTP}${HTTP:+,}${S}"
              fi
            done
            echo "http_scrapers=$HTTP" >> $GITHUB_OUTPUT
            echo "playwright_scrapers=$PW" >> $GITHUB_OUTPUT
          fi

  run-http:
    needs: check
    if: needs.check.outputs.http_scrapers != ''
    runs-on: ubuntu-latest
    name: Scrapers HTTP
    steps:
      - name: Ejecutar scrapers HTTP
        run: |
          IFS=',' read -ra SCRAPER_LIST <<< "${{ needs.check.outputs.http_scrapers }}"
          for SCRAPER in "${SCRAPER_LIST[@]}"; do
            echo "Ejecutando HTTP: $SCRAPER"
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.VTEX_SESSION_SECRET }}" \
              -H "Content-Type: application/json" \
              -d "{\"scraperId\":\"$SCRAPER\"}" \
              "${{ secrets.API_URL }}/api/internal/run-scraper"
            echo ""
          done

  run-playwright:
    needs: check
    if: needs.check.outputs.playwright_scrapers != ''
    runs-on: ubuntu-latest
    name: Scrapers Playwright
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: playwright-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Ejecutar scrapers Playwright
        shell: bash
        env:
          API_URL: ${{ secrets.API_URL }}
          VTEX_SESSION_SECRET: ${{ secrets.VTEX_SESSION_SECRET }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          IFS=',' read -ra SCRAPER_LIST <<< "${{ needs.check.outputs.playwright_scrapers }}"
          for SCRAPER in "${SCRAPER_LIST[@]}"; do
            echo "Ejecutando Playwright: $SCRAPER"
            npx tsx scripts/run-playwright-scraper.ts "$SCRAPER"
          done
